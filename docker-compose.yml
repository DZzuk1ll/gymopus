services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gymopus
      POSTGRES_PASSWORD: gymopus
      POSTGRES_DB: gymopus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymopus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
