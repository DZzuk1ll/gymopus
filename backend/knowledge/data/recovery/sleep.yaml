entries:
  - id: "recov_sleep_001"
    source: "Vitale et al. 2019; National Sleep Foundation"
    section: "Sleep Requirements for Athletes"
    category: "recovery"
    subcategory: "sleep"
    title: "运动员睡眠需求量"
    content: |
      大多数成年人需要每晚7-9小时的睡眠，而运动员由于高强度训练带来的身体修复需求，可能需要8-10小时以实现最佳恢复。Vitale等人(2019年)在《运动员睡眠卫生优化恢复》综述中指出，睡眠不足(<7小时)会增加循环应激激素(如皮质醇)水平、降低碳水化合物储存(糖原)的再生效率、破坏食欲调节并影响能量消耗。充足的深度睡眠(慢波睡眠)是生长激素脉冲释放的关键时期，约70-80%的每日生长激素分泌发生在夜间睡眠的前半段。个体化的睡眠需求可能有所不同，建议运动员关注自身的主观睡眠需求而非固守统一标准。
    tags:
      - "sleep-duration"
      - "athletes"
      - "growth-hormone"
      - "recovery"

  - id: "recov_sleep_002"
    source: "Mah et al. 2011; Fullagar et al. 2015"
    section: "Sleep and Performance"
    category: "recovery"
    subcategory: "sleep"
    title: "睡眠与运动表现关系"
    content: |
      Mah等人(2011年)对斯坦福大学篮球运动员的研究发现，将睡眠延长至每晚至少10小时后，运动员的冲刺速度提高了4%，投篮命中率提高了9%，反应时间显著缩短。相反，睡眠不足会对反应速度、准确性、力量、耐力和判断力产生明显的负面影响。一晚睡眠不足即可导致最大肌力下降约9%、最大次数(rep max)下降更多。慢性睡眠不足还与受伤风险增加相关：每晚睡眠不足8小时的运动员受伤概率是充足睡眠者的1.7倍。睡眠质量(深度和连续性)与睡眠数量同样重要，频繁觉醒会破坏恢复性睡眠阶段的完整性。
    tags:
      - "performance"
      - "sleep-extension"
      - "injury-risk"
      - "reaction-time"

  - id: "recov_sleep_003"
    source: "Vitale et al. 2019; Irish et al. 2015"
    section: "Sleep Hygiene Practices"
    category: "recovery"
    subcategory: "sleep"
    title: "睡眠卫生实践指南"
    content: |
      良好的睡眠卫生是优化运动恢复的基础策略。核心建议包括：保持固定的就寝和起床时间(即使在非训练日)；卧室环境控制——温度维持在18-20°C、完全遮光、减少噪音；睡前60-90分钟避免蓝光暴露(手机、电脑)，因蓝光会抑制褪黑素分泌延迟约30分钟入睡。睡前4-6小时避免咖啡因(半衰期约5-6小时)，睡前2-3小时避免大量进食和剧烈运动。建立睡前放松程序(如热水浴、阅读、拉伸、呼吸练习)有助于激活副交感神经系统。酒精虽可加速入睡，但会显著破坏REM睡眠和深度睡眠质量。
    tags:
      - "sleep-hygiene"
      - "melatonin"
      - "blue-light"
      - "bedroom-environment"

  - id: "recov_sleep_004"
    source: "Waterhouse et al. 2007; Lastella et al. 2015"
    section: "Napping Strategies"
    category: "recovery"
    subcategory: "sleep"
    title: "午睡策略与运动表现"
    content: |
      战略性午睡可有效弥补夜间睡眠不足并提升下午训练表现。研究表明，20-30分钟的短时午睡(power nap)可显著改善冲刺表现、降低疲劳感知评分，且不会引起严重的睡眠惯性。最佳午睡时间为13:00-16:00(与人体昼夜节律中的自然警觉度低谷对应)。午睡后应预留至少30分钟清醒时间以消除睡眠惯性后再进行训练或比赛。长时午睡(90分钟)可完成一个完整的睡眠周期，对体能恢复效果更强，但睡眠惯性也更明显。超过16:00的午睡可能干扰夜间入睡。在睡眠受限的运动员中，午睡的体能恢复效果比充分睡眠的运动员更为显著。
    tags:
      - "napping"
      - "power-nap"
      - "circadian-rhythm"
      - "sleep-inertia"

  - id: "recov_sleep_005"
    source: "Simpson et al. 2017; Spiegel et al. 1999"
    section: "Sleep Debt Impact"
    category: "recovery"
    subcategory: "sleep"
    title: "睡眠债务的累积影响"
    content: |
      睡眠债务指实际睡眠与个体需求之间的累积差异，其影响是可叠加的。连续多晚每晚减少2小时睡眠的累积效果等同于完全剥夺1-2晚睡眠。Spiegel等人的研究发现，每晚限制睡眠至4小时持续6晚后，葡萄糖耐受性下降40%、皮质醇水平升高、生长激素分泌减少。睡眠债务对运动表现的影响包括：合成代谢激素减少和分解代谢激素增加，导致肌肉恢复和合成受阻；免疫功能受损(NK细胞活性下降)增加感染风险；认知功能下降影响技术动作执行和运动决策。恢复睡眠债务不能简单通过"周末补觉"完全弥补，需要数天的规律充足睡眠才能逐步恢复至基线水平。
    tags:
      - "sleep-debt"
      - "hormones"
      - "cortisol"
      - "immune-function"

  - id: "recov_sleep_006"
    source: "Dattilo et al. 2011; Halson 2014"
    section: "Sleep and Muscle Recovery"
    category: "recovery"
    subcategory: "sleep"
    title: "睡眠与肌肉修复机制"
    content: |
      睡眠期间的肌肉修复和生长通过多重生理机制实现。慢波睡眠(N3期)期间垂体释放大量生长激素(GH)，刺激肌肉蛋白质合成和组织修复；同时皮质醇水平降至全天最低点，减少蛋白质分解。睡眠还促进肌糖原再合成和细胞水合恢复。REM睡眠对神经肌肉协调的巩固和运动技能记忆至关重要——运动学习后的第一晚睡眠对技能记忆的固化尤为关键。Dattilo等人(2011年)总结指出，睡眠剥夺会使蛋白质合成与分解的平衡向分解方向倾斜，增加肌肉中促炎细胞因子(IL-6、TNF-alpha)的表达，从而延缓恢复过程。因此，将睡眠视为训练计划的核心组成部分而非可牺牲的项目，对长期训练适应至关重要。
    tags:
      - "muscle-recovery"
      - "growth-hormone"
      - "slow-wave-sleep"
      - "protein-synthesis"
