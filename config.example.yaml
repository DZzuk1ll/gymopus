database:
  url: postgresql+asyncpg://gymopus:gymopus@localhost:5432/gymopus

# Default LLM (for users without their own API key)
default_llm:
  base_url: https://api.deepseek.com/v1
  api_key: sk-xxx
  model: deepseek-chat

# Embedding API (for RAG vectorization)
embedding:
  base_url: https://api.siliconflow.cn/v1
  api_key: sk-xxx
  model: BAAI/bge-large-zh-v1.5

# LangSmith (optional, leave empty to disable)
langsmith:
  api_key: ""
  project: gymopus

# Application
app:
  secret_key: change-me
  daily_llm_limit: 20
